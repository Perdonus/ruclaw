name: Android APK Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
    defaults:
      run:
        working-directory: android-app
        shell: bash

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Derive release version
        id: meta
        run: |
          release_tag="${RELEASE_REF#refs/tags/}"
          if [[ -z "${release_tag}" ]]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          version_name="${release_tag#v}"
          version_code="$(git rev-list --count "${release_tag}")"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"

      - name: Prepare signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for required in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!required}" ]]; then
              echo "Missing ${required}" >&2
              exit 1
            fi
          done

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${RUNNER_TEMP}/ruclaw-release.keystore"

      - name: Build Android runtime assets
        working-directory: .
        env:
          GOVERSION: ${{ steps.setup-go.outputs.go-version }}
        run: |
          ./scripts/build-android-runtime-assets.sh "${RUNNER_TEMP}/android-runtime-assets"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/ruclaw-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          RUCLAW_ANDROID_RUNTIME_ASSETS_DIR: ${{ runner.temp }}/android-runtime-assets
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --console=plain assembleRelease \
            -PCI_VERSION_NAME=${{ steps.meta.outputs.version_name }} \
            -PCI_VERSION_CODE=${{ steps.meta.outputs.version_code }} 2>&1 | tee gradle-release.log

      - name: Surface Gradle failure
        if: failure()
        run: |
          python3 <<'PY'
          from pathlib import Path

          log = Path("gradle-release.log")
          lines = log.read_text(errors="ignore").splitlines() if log.exists() else []
          markers = []
          for line in lines:
              stripped = line.strip()
              lowered = stripped.lower()
              if (
                  stripped.startswith("e: ")
                  or " what went wrong" in lowered
                  or "execution failed" in lowered
                  or "caused by:" in lowered
                  or "exception" in lowered
                  or "error:" in lowered
                  or "aapt" in lowered
                  or "java heap space" in lowered
                  or "outofmemory" in lowered
              ):
                  markers.append(stripped)

          output = markers[-60:] if markers else [line.rstrip() for line in lines[-120:]]

          for line in output:
              safe = line.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error::{safe}")
          PY

      - name: Prepare release assets
        run: |
          mkdir -p ../release-artifacts
          cp app/build/outputs/apk/release/app-release.apk ../release-artifacts/ruclaw-android-release.apk
          sha256sum ../release-artifacts/ruclaw-android-release.apk > ../release-artifacts/ruclaw-android-release.apk.sha256

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruclaw-android-release-gradle-log
          path: android-app/gradle-release.log
          if-no-files-found: ignore

      - name: Upload APK release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.meta.outputs.release_tag }}" >/dev/null
          gh release upload "${{ steps.meta.outputs.release_tag }}" \
            ../release-artifacts/ruclaw-android-release.apk \
            ../release-artifacts/ruclaw-android-release.apk.sha256 \
            --clobber
