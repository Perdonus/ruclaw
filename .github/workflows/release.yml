name: Create Tag and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (required, e.g. v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false
      upload_tos:
        description: "Upload to Volcengine TOS"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  create-tag:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Create Git Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  release-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: GoReleaser Release (manual)
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_REPOSITORY != '' }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Setup Go from go.mod
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare GoReleaser config
        id: goreleaser-config
        shell: bash
        run: |
          config=.goreleaser.yaml

          if [[ "${HAS_DOCKERHUB}" != "true" ]]; then
            python3 <<'PY'
            from pathlib import Path
            import re

            src = Path(".goreleaser.yaml")
            dst = Path(".goreleaser.release.yml")
            pattern = re.compile(
                r"(?m)^[ \t]*-[ \t]*['\"]docker\.io/\{\{ \.Env\.DOCKERHUB_IMAGE_NAME \}\}['\"][ \t]*\n"
            )

            content = src.read_text()
            rewritten, removed = pattern.subn("", content)
            if removed == 0:
                raise SystemExit("docker.io image template not found in .goreleaser.yaml")

            dst.write_text(rewritten)
            PY
            config=.goreleaser.release.yml
          fi

          echo "config=${config}" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean --config=${{ steps.goreleaser-config.outputs.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}
          GOVERSION: ${{ steps.setup-go.outputs.go-version }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Apply release flags
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag }}" \
            --draft=${{ inputs.draft }} \
            --prerelease=${{ inputs.prerelease }}

  release-tag:
    if: ${{ github.event_name == 'push' }}
    name: GoReleaser Release (tag push)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_REPOSITORY != '' }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Go from go.mod
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare GoReleaser config
        id: goreleaser-config
        shell: bash
        run: |
          config=.goreleaser.yaml

          if [[ "${HAS_DOCKERHUB}" != "true" ]]; then
            python3 <<'PY'
            from pathlib import Path
            import re

            src = Path(".goreleaser.yaml")
            dst = Path(".goreleaser.release.yml")
            pattern = re.compile(
                r"(?m)^[ \t]*-[ \t]*['\"]docker\.io/\{\{ \.Env\.DOCKERHUB_IMAGE_NAME \}\}['\"][ \t]*\n"
            )

            content = src.read_text()
            rewritten, removed = pattern.subn("", content)
            if removed == 0:
                raise SystemExit("docker.io image template not found in .goreleaser.yaml")

            dst.write_text(rewritten)
            PY
            config=.goreleaser.release.yml
          fi

          echo "config=${config}" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean --config=${{ steps.goreleaser-config.outputs.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}
          GOVERSION: ${{ steps.setup-go.outputs.go-version }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

  upload-tos:
    name: Upload to TOS
    needs: release-manual
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_tos }}
    uses: ./.github/workflows/upload-tos.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit
