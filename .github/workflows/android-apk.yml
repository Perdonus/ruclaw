name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: android-app
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --console=plain assembleDebug 2>&1 | tee gradle-build.log

      - name: Surface Gradle failure
        if: failure()
        run: |
          python3 <<'PY'
          from pathlib import Path

          log = Path("gradle-build.log")
          lines = log.read_text(errors="ignore").splitlines() if log.exists() else []
          markers = []
          for line in lines:
              stripped = line.strip()
              lowered = stripped.lower()
              if (
                  stripped.startswith("e: ")
                  or " what went wrong" in lowered
                  or "execution failed" in lowered
                  or "caused by:" in lowered
                  or "exception" in lowered
                  or "error:" in lowered
                  or "aapt" in lowered
                  or "java heap space" in lowered
                  or "outofmemory" in lowered
              ):
                  markers.append(stripped)

          output = markers[-60:] if markers else [line.rstrip() for line in lines[-120:]]

          for line in output:
              safe = line.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error::{safe}")
          PY

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruclaw-android-gradle-log
          path: android-app/gradle-build.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ruclaw-android-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
