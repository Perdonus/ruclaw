name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android-app/**"
      - "cmd/picoclaw/**"
      - "pkg/**"
      - "web/backend/**"
      - "web/frontend/**"
      - "scripts/build-android-runtime-assets.sh"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "android-app/**"
      - "cmd/picoclaw/**"
      - "pkg/**"
      - "web/backend/**"
      - "web/frontend/**"
      - "scripts/build-android-runtime-assets.sh"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: android-app
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Build Android runtime assets
        working-directory: .
        env:
          GOVERSION: ${{ steps.setup-go.outputs.go-version }}
        run: |
          ./scripts/build-android-runtime-assets.sh "${RUNNER_TEMP}/android-runtime-assets"

      - name: Build debug APK
        env:
          RUCLAW_ANDROID_RUNTIME_ASSETS_DIR: ${{ runner.temp }}/android-runtime-assets
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --console=plain assembleDebug 2>&1 | tee gradle-build.log

      - name: Surface Gradle failure
        if: failure()
        run: |
          python3 <<'PY'
          from pathlib import Path

          log = Path("gradle-build.log")
          lines = log.read_text(errors="ignore").splitlines() if log.exists() else []
          markers = []
          for line in lines:
              stripped = line.strip()
              lowered = stripped.lower()
              if (
                  stripped.startswith("e: ")
                  or " what went wrong" in lowered
                  or "execution failed" in lowered
                  or "caused by:" in lowered
                  or "exception" in lowered
                  or "error:" in lowered
                  or "aapt" in lowered
                  or "java heap space" in lowered
                  or "outofmemory" in lowered
              ):
                  markers.append(stripped)

          output = markers[-60:] if markers else [line.rstrip() for line in lines[-120:]]

          for line in output:
              safe = line.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error::{safe}")
          PY

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruclaw-android-gradle-log
          path: android-app/gradle-build.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ruclaw-android-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Prepare rolling release assets
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ../release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk ../release-artifacts/ruclaw-android-debug.apk
          sha256sum ../release-artifacts/ruclaw-android-debug.apk > ../release-artifacts/ruclaw-android-debug.apk.sha256

      - name: Publish rolling APK release
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_tag="android-latest"
          release_title="Android Latest"
          release_notes_file="${RUNNER_TEMP}/android-latest-release-notes.md"

          cat > "${release_notes_file}" <<EOF
          Auto-updated debug APK from `main`.

          Commit: `${GITHUB_SHA}`
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${release_tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${release_tag}" --force

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "${release_title}" \
              --notes-file "${release_notes_file}" \
              --prerelease
          else
            gh release create "${release_tag}" \
              --title "${release_title}" \
              --notes-file "${release_notes_file}" \
              --prerelease
          fi

          gh release upload "${release_tag}" \
            release-artifacts/ruclaw-android-debug.apk \
            release-artifacts/ruclaw-android-debug.apk.sha256 \
            --clobber
